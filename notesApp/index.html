<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Notes App - Customer Support Documentation Tool" />
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
  </head>

  <body>
    <div class="app-wrapper">
      <!-- Header -->
      <header class="app-header">
        <div class="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <div class="header-text">
          <h1>Notes App</h1>
          <p>Customer Support Documentation</p>
        </div>
      </header>

      <!-- Form -->
      <main class="form-container">
        <form id="form" novalidate>

          <!-- Customer Information -->
          <div class="field-group" id="group-customer">
            <label class="field-label" for="nameText">
              <span class="label-dot dot-blue"></span>
              Customer Information
            </label>
            <div class="field-body">
              <textarea
                id="nameText"
                class="input"
                placeholder="Enter customer name, account, contact info..."
                rows="3"
              ></textarea>
            </div>
          </div>

          <!-- Issue -->
          <div class="field-group" id="group-issue">
            <label class="field-label" for="issueText">
              <span class="label-dot dot-red"></span>
              Issue
            </label>
            <div class="field-body">
              <textarea
                id="issueText"
                class="input"
                placeholder="Describe the issue reported by the customer..."
                rows="4"
              ></textarea>
              <div class="image-zone" id="imageZone-issue" data-field="issue">
                <div class="image-zone-hint">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  <span>Paste or drag &amp; drop screenshot here</span>
                </div>
                <div class="image-previews" id="previews-issue"></div>
              </div>
            </div>
          </div>

          <!-- Action -->
          <div class="field-group" id="group-action">
            <label class="field-label" for="actionText">
              <span class="label-dot dot-yellow"></span>
              Action
            </label>
            <div class="field-body">
              <textarea
                id="actionText"
                class="input"
                placeholder="What steps were taken to address the issue..."
                rows="4"
              ></textarea>
              <div class="image-zone" id="imageZone-action" data-field="action">
                <div class="image-zone-hint">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  <span>Paste or drag &amp; drop screenshot here</span>
                </div>
                <div class="image-previews" id="previews-action"></div>
              </div>
            </div>
          </div>

          <!-- Resolution -->
          <div class="field-group" id="group-resolution">
            <label class="field-label" for="resolutionText">
              <span class="label-dot dot-green"></span>
              Resolution
            </label>
            <div class="field-body">
              <textarea
                id="resolutionText"
                class="input"
                placeholder="How was the issue resolved..."
                rows="4"
              ></textarea>
              <div class="image-zone" id="imageZone-resolution" data-field="resolution">
                <div class="image-zone-hint">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  <span>Paste or drag &amp; drop screenshot here</span>
                </div>
                <div class="image-previews" id="previews-resolution"></div>
              </div>
            </div>
          </div>

          <!-- Buttons -->
          <div class="buttons-area">
            <button type="button" id="copyButton" class="btn btn-primary">
              <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              <span id="copyBtnText">Copy Note</span>
            </button>
            <button type="submit" id="clearButton" class="btn btn-secondary">
              <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
              </svg>
              <span>Clear All</span>
            </button>
          </div>

        </form>
      </main>

      <!-- Toast notification -->
      <div id="toast" class="toast" role="alert" aria-live="polite">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Copied to clipboard!</span>
      </div>
    </div>

    <!-- Image lightbox -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <img id="lightboxImg" src="" alt="Full size preview" />
    </div>

    <script src="scripts.js" defer></script>
  </body>
</html>
